<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <title></title>
    <link rel="stylesheet" href="./styles.css">
    <audio id="bgm" src="./music.mp3" autoplay preload="auto" loop></audio>
  </head>
  <body>
    <script defer src="./index.js"></script>
   
    <div style="margin: auto;width: 700px;">
       <header><div class="header">Zooming text maker</div>
      <marquee>Zoom it! Copy it! Use it! Welcome to the 3D realm. Hopefully your browser can handle it!</marquee></header>
    <button id="mus">Play some music?</button>
      <main width="700px">
      <label for="text">Put ur text right here:</label>
      <br>
      <textarea id="text"></textarea></main>
      <button id="make">Click to make text</button>
      <br>
      <label for="output" >Your freshly baked code comes out here:</label>
      <br>
      <textarea id="output"></textarea>
      <br>
      <p>A little look at what you made goes here</p>
      <br>
      <div id="preview"></div>
      <br>
      <br>
      <br>
    </main>
    <footer>as it says on the tin</footer>
    </div>
  </body>
</html>
