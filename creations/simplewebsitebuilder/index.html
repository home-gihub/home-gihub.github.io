<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWB</title>
    <link rel="stylesheet" href="./wizardstyles.css">
</head>
<body>
    <script src="wizard.js" defer></script>
    <main>
        <h1 id="header">Welcome!</h1>
        <hr>
        <p id="summary">

    <footer>
        <button onclick="next()">
            Next >
        </button>
        
    </footer>

</html>
