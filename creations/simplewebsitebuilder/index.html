<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWB</title>
    <link rel="stylesheet" href="./wizardstyles.css">
</head>
<body>
    <script src="wizard.js" defer></script>
    <div id="pageeditor" style="visibility: hidden;">
        <p>Page editor</p>
        <span>Edit the...
            <select>
                <option value="main">Main content</option>
                <option value="lsidebar">Left sidebar</option>
                <option value="rsidebar">Right sidebar</option>
                <option value="navbar">Navbar</option>
                <option value="header">Header</option>
            </select>
        </span>
        <div id="editoropts">
            <p>Click on an option to edit it!</p>
        </div>
    </div>
    <div id="page" style="width:100%;height:100%;" >
    <main>
        <h1 id="header">Welcome!</h1>
        <hr>
        <p id="summary">
            Welcome to the simple website builder!
            Before you make your website, you'll need to answer a few questions
            before making your website.
        </p>
        <br>
        <p id="action">When you're ready to proceed, press Next</p>
        <hr>
    </main>
    
    <footer>
        <button onclick="next()">
            Next >
        </button>
        
    </footer>
    </div>
</body>
</html>
